  <style>
    * {
      margin: 0;

      box-sizing: border-box;

    }

    body {
      background-color: #f5a957;
      overflow-y: auto; /* Page scroll hone dega */
    }

    .dashboard {
      display: flex;
      min-height: 100vh;
      padding: 20px;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background-color: #3c1518;
      color: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.3);
      margin-right: 20px;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 22px;
      border-bottom: 2px solid #f73e10;
      padding-bottom: 10px;
      color: #f73e10;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar ul li {
      margin: 15px 0;
    }

    .sidebar ul li a {
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      padding: 10px;
      border-radius: 5px;
      transition: background 0.3s, transform 0.2s;
    }

    .sidebar ul li a i {
      margin-right: 10px;
    }

    .sidebar ul li a:hover,
    .sidebar ul li a.active {
      background-color: #f73e10;
      font-weight: bold;
      transform: translateX(5px);
    }

    /* Main Content */
    .main-content {
      flex: 1;  
      padding: 40px;
    }

    .main-content h1 {
      font-size: 40px;
      color: hsl(2, 92%, 49%);
      margin-bottom: 20px;
      position: fixed;
    }

    .main-content p {
      margin-top: 100px;
      font-size: 18px;
      color: #333;
      line-height: 1.6;
      position: fixed;
    }

    @media (max-width: 768px) {
      .dashboard {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        margin-right: 0;
        margin-bottom: 20px;
      }
    }
  </style>
</head>
