<body>

<!-- ===== HEADER START ===== -->
<header>
  <div class="header-left">
    <img src="../image/logo.jpg" alt="Library Logo">
    <h1>📚 BookWorm</h1>
  </div>

  <nav>
    <ul>
      <li><a href="../index.html">HOME</a></li>
      <li><a href="../user_login/index.php">USER LOGIN</a></li>
      <li><a href="../admin_login/index.php">ADMIN LOGIN</a></li>
    </ul>
  </nav>
</header>
<!-- ===== HEADER END ===== -->

<!-- ===== CONTACT SECTION ===== -->
<div class="contact-section">
  <div class="form-container">
    <h2>BookWorm Contact Form</h2>
    <p>Get in touch with us!</p>

    <!-- <div id="successMessage">
      ✅ Thank you! Your message has been sent successfully. We will get back to you soon.
    </div> -->

     <form action="send.php" method="POST" id="form">
      <label>Name:<span style="color:red;">*</span></label>
      <div class="name-fields">
        <input type="text" name="first" placeholder="First*" id="first_name" required>
        <input type="text" name="last" placeholder="Last*" id="last_name" required>
        <div id="nameError" class="error"></div>
      </div>

      <label>Email:<span style="color:red;">*</span></label>
      <input type="email" name="email" id="email" required>
      <div id="emailError" class="error"></div>

      <label>I would like to talk with someone about:<span style="color:red;">*</span></label>
      <select name="topic" required>
        <option>Please select</option>
        <option value="book-issue">Book Issue</option>
        <option value="suggestion">Suggestions</option>
        <option value="other">Other</option>
      </select>

      <label>Message:<span style="color:red;">*</span></label>
      <textarea rows="4" name="message" required></textarea>

      <button class="submit-btn" type="submit">SUBMIT FORM</button>
    </form>
  </div>

  <div class="image-section"></div>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault(); 

    document.getElementById("nameError").textContent='';
    document.getElementById("emailError").textContent='';

    const firstName = document.getElementById("first_name").value.trim();
    const lastName = document.getElementById("last_name").value.trim();
    const email = document.getElementById("email").value.trim();

    let isValid = true;

    // Name Validation : No number, no special character
    const namePattern = /^[A-Za-z]{2,}$/;

    if(!namePattern.test(firstName) || !namePattern.test(lastName)){
        document.getElementById('nameError').textContent = 'Enter valid name (Only letters, min 2 letters).';
        isValid=false;
    }

    // Email Validation
    const emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!emailPattern.test(email)){
        document.getElementById('emailError').textContent='Enter valid email.';
        isValid = false;
    }

    if(isValid){
        this.submit(); // finally submit form
    }

});
</script>

</body>
